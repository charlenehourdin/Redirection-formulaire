<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    var languages = navigator.languages || [navigator.language || "en"];
    var detected = languages[0].toLowerCase().split("-")[0];
    alert("Langue détectée : " + detected + "\nToutes les langues : " + JSON.stringify(languages));
  </script>
</head>
</html>
